<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title or "Fadi Store" }}</title>
  <style>
    body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
    a{color:inherit;text-decoration:none}
    .top{padding:18px 16px;border-bottom:1px solid #1f2937;background:#020617;display:flex;justify-content:space-between;align-items:center}
    .wrap{max-width:860px;margin:0 auto;padding:16px}
    .grid2{display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:900px){.grid2{grid-template-columns:1.2fr 0.8fr}}
    .grid3{display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:700px){.grid3{grid-template-columns:repeat(3,1fr)}}
    .card{background:#020617;border:1px solid #1f2937;border-radius:14px;padding:16px}
    .muted{color:#cbd5e1}
    .pill{display:inline-block;padding:6px 12px;border-radius:999px;background:#0b1220;border:1px solid #334155;font-size:12px}
    .btn{display:inline-block;padding:10px 14px;border-radius:12px;background:#2563eb;border:0;color:#fff;font-weight:700;cursor:pointer}
    .btn.secondary{background:#334155}
    input,select{width:100%;padding:10px;border-radius:12px;border:1px solid #334155;background:#0b1220;color:#fff}
    label{display:block;margin:10px 0 6px}
    .row{display:flex;gap:10px}
    .row > div{flex:1}
    .sep{border-top:1px dashed #334155;margin:12px 0}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #1f2937;text-align:left;font-size:13px}
    .badge{padding:4px 8px;border-radius:999px;border:1px solid #334155;background:#0b1220;font-size:12px}
  </style>
</head>
<body>
  <div class="top">
    <div>
      <div style="font-weight:800">{{ header_title or "Fadi Store" }}</div>
      {% if phone %}<div class="muted" style="font-size:13px">Phone: {{ phone }}</div>{% endif %}
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      {% if balance %}<span class="pill">Balance: {{ balance }} LBP</span>{% endif %}
      {% if phone %}
        <a class="pill" href="/">Home</a>
        <a class="pill" href="/my-orders">My Order</a>
        <a class="pill" href="/logout">Logout</a>
      {% endif %}
    </div>
  </div>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
