<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحت الصيانة</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
      font-family:Arial,sans-serif;
      overflow:hidden;
      color:white;
    }

    .bg{
      position:absolute;
      width:600px;
      height:600px;
      background:#3b82f6;
      filter:blur(180px);
      opacity:0.25;
      border-radius:50%;
      animation:move 8s infinite alternate ease-in-out;
    }

    @keyframes move{
      from{
        transform:translate(-100px,-100px);
      }
      to{
        transform:translate(100px,80px);
      }
    }

    .card{
      position:relative;
      z-index:2;
      width:90%;
      max-width:600px;
      padding:50px 35px;
      border-radius:25px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.1);
      text-align:center;
      box-shadow:0 8px 40px rgba(0,0,0,0.4);
    }

    .icon{
      font-size:70px;
      margin-bottom:20px;
      animation:float 2s infinite ease-in-out;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    h1{
      font-size:42px;
      margin-bottom:15px;
    }

    p{
      font-size:20px;
      line-height:1.8;
      color:#d1d5db;
    }

    .status{
      margin-top:30px;
      display:inline-block;
      padding:12px 25px;
      border-radius:50px;
      background:#2563eb;
      font-size:15px;
      letter-spacing:1px;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">
  <div class="icon">🚧</div>

  <h1>الموقع تحت الصيانة</h1>

  <p>
    نعمل حالياً على تحسين الموقع وتجهيز تجربة أفضل لكم.
    <br>
    سنعود قريباً 🚀
  </p>

  <div class="status">
    Maintenance Mode
  </div>
</div>

</body>
</html>
