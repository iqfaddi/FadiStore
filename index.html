<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fadi Store | Maintenance</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial,sans-serif;
      overflow:hidden;
      position:relative;
      background:#000;
      color:white;
    }

    /* Background Image */
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:url("logo.jpg") center center/cover no-repeat;
      filter:blur(4px) brightness(0.25);
      transform:scale(1.05);
    }

    /* Dark Overlay */
    body::after{
      content:"";
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.65);
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:700px;
      text-align:center;
      padding:45px 35px;
      border-radius:28px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,215,0,0.2);
      box-shadow:0 0 40px rgba(255,215,0,0.15);
    }

    .logo{
      width:220px;
      margin-bottom:25px;
      border-radius:18px;
      box-shadow:0 0 30px rgba(255,215,0,0.2);
    }

    h1{
      font-size:54px;
      color:#facc15;
      letter-spacing:3px;
      margin-bottom:10px;
    }

    .sub{
      color:#d1d5db;
      font-size:16px;
      letter-spacing:4px;
      margin-bottom:35px;
    }

    .arabic{
      font-size:34px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .english{
      font-size:21px;
      color:#d1d5db;
      line-height:1.8;
      margin-bottom:30px;
    }

    .whatsapp-btn{
      display:inline-block;
      padding:16px 32px;
      background:#25D366;
      color:white;
      text-decoration:none;
      border-radius:50px;
      font-size:18px;
      font-weight:bold;
      transition:0.3s;
      box-shadow:0 0 25px rgba(37,211,102,0.35);
    }

    .whatsapp-btn:hover{
      transform:scale(1.06);
      background:#1ebe5d;
    }

    .footer{
      margin-top:35px;
      font-size:14px;
      color:#9ca3af;
      letter-spacing:1px;
    }

    @media(max-width:768px){

      h1{
        font-size:40px;
      }

      .arabic{
        font-size:26px;
      }

      .english{
        font-size:18px;
      }

      .logo{
        width:170px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <!-- ضع اسم الصورة هنا -->
    <img src="logo.jpg" alt="Fadi Store Logo" class="logo">

    <h1>FADI STORE</h1>

    <div class="sub">
      APPLICATION SUBSCRIPTIONS
    </div>

    <div class="arabic">
      🚧 الموقع تحت الصيانة
    </div>

    <div class="english">
      We are currently improving the website
      to provide you with a better experience.
      <br><br>
      نعمل حالياً على تطوير الموقع
      وسنعود قريباً بحلة جديدة 🚀
    </div>

    <a 
      href="https://wa.me/9613177862"
      target="_blank"
      class="whatsapp-btn"
    >
      WhatsApp: +9613177862
    </a>

    <div class="footer">
      © Fadi Store — All Rights Reserved
    </div>

  </div>

</body>
</html>
