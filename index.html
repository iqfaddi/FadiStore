<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fadi Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">Fadi Store</div>
  <a class="btn" href="https://wa.me/9613177862" target="_blank">Contact</a>
</header>

<section class="hero">
  <h1>Premium Subscriptions</h1>
  <p>Fast delivery • Secure • Best prices</p>

  <div class="cta">
    <a href="#services" class="primary">Browse Services</a>
    <a href="https://wa.me/9613177862" class="secondary">WhatsApp</a>
  </div>

  <div class="stats">
    <div>10K+ Customers</div>
    <div>4.9 Rating</div>
    <div>24/7 Support</div>
  </div>
</section>

<section id="services">
  <h2>Services</h2>
  <div id="servicesGrid" class="grid"></div>
</section>

<div id="modal" class="modal hidden">
  <div class="box">
    <h3 id="modalTitle"></h3>

    <select id="planSelect"></select>

    <div class="price">Price: <span id="priceValue"></span></div>

    <div class="actions">
      <button id="cancelBtn">Cancel</button>
      <a id="buyBtn" target="_blank">Order</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
