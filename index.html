<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fadi Store | Maintenance</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
      background:
      radial-gradient(circle at top left,#4d3500 0%,transparent 30%),
      radial-gradient(circle at bottom right,#3a2800 0%,transparent 30%),
      linear-gradient(135deg,#050505,#0f0f0f,#000000);
      color:white;
      position:relative;
    }

    /* Animated Background Glow */

    .glow1,
    .glow2{
      position:absolute;
      border-radius:50%;
      filter:blur(120px);
      opacity:0.18;
      animation:float 8s infinite alternate ease-in-out;
    }

    .glow1{
      width:450px;
      height:450px;
      background:#facc15;
      top:-120px;
      left:-100px;
    }

    .glow2{
      width:350px;
      height:350px;
      background:#f59e0b;
      bottom:-100px;
      right:-80px;
      animation-delay:2s;
    }

    @keyframes float{
      from{
        transform:translateY(-20px) translateX(-20px);
      }

      to{
        transform:translateY(30px) translateX(30px);
      }
    }

    /* Main Card */

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:760px;
      padding:65px 50px;
      text-align:center;
      border-radius:35px;

      background:rgba(255,255,255,0.05);

      border:1px solid rgba(255,215,0,0.15);

      backdrop-filter:blur(16px);

      box-shadow:
      0 0 60px rgba(255,215,0,0.08),
      inset 0 0 30px rgba(255,255,255,0.03);
    }

    /* Luxury Logo */

    .logo{
      width:140px;
      height:140px;
      margin:auto;
      margin-bottom:30px;

      border-radius:35px;

      background:
      linear-gradient(145deg,#ffd54a,#b8860b);

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:65px;
      font-weight:700;
      color:#111;

      box-shadow:
      0 0 40px rgba(250,204,21,0.35),
      inset 0 0 15px rgba(255,255,255,0.25);
    }

    h1{
      font-size:60px;
      font-weight:700;
      letter-spacing:6px;
      color:#facc15;
      margin-bottom:12px;
      text-shadow:0 0 18px rgba(250,204,21,0.35);
    }

    .subtitle{
      font-size:14px;
      letter-spacing:7px;
      color:#bdbdbd;
      margin-bottom:45px;
    }

    .divider{
      width:90px;
      height:3px;
      background:#facc15;
      margin:0 auto 35px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(250,204,21,0.4);
    }

    .arabic{
      font-size:34px;
      font-weight:600;
      margin-bottom:18px;
      color:#ffffff;
    }

    .english{
      font-size:20px;
      line-height:2;
      color:#d6d6d6;
      margin-bottom:40px;
    }

    /* WhatsApp Button */

    .whatsapp{
      display:inline-flex;
      align-items:center;
      gap:12px;

      padding:18px 38px;

      border-radius:70px;

      background:
      linear-gradient(135deg,#25D366,#1faa52);

      color:white;
      text-decoration:none;

      font-size:18px;
      font-weight:600;

      transition:0.35s ease;

      box-shadow:
      0 0 30px rgba(37,211,102,0.35);
    }

    .whatsapp:hover{
      transform:translateY(-4px) scale(1.03);

      box-shadow:
      0 0 45px rgba(37,211,102,0.5);
    }

    .footer{
      margin-top:45px;
      color:#8f8f8f;
      font-size:13px;
      letter-spacing:2px;
    }

    /* Mobile */

    @media(max-width:768px){

      .container{
        padding:50px 28px;
      }

      .logo{
        width:110px;
        height:110px;
        font-size:52px;
      }

      h1{
        font-size:40px;
        letter-spacing:3px;
      }

      .subtitle{
        font-size:11px;
        letter-spacing:4px;
      }

      .arabic{
        font-size:26px;
      }

      .english{
        font-size:17px;
      }

      .whatsapp{
        font-size:16px;
        padding:16px 28px;
      }

    }

  </style>
</head>

<body>

  <div class="glow1"></div>
  <div class="glow2"></div>

  <div class="container">

    <div class="logo">
      F
    </div>

    <h1>FADI STORE</h1>

    <div class="subtitle">
      APPLICATION SUBSCRIPTIONS
    </div>

    <div class="divider"></div>

    <div class="arabic">
      🚧 الموقع تحت الصيانة
    </div>

    <div class="english">
      We are currently upgrading the website
      to provide you with a premium experience.
      <br><br>
      نعمل حالياً على تطوير الموقع
      لنقدم لكم تجربة أفضل وأكثر احترافية ✨
    </div>

    <a
      href="https://wa.me/9613177862"
      target="_blank"
      class="whatsapp"
    >
      💬 WhatsApp Support
    </a>

    <div class="footer">
      +961 3 177 862
      <br><br>
      © Fadi Store — All Rights Reserved
    </div>

  </div>

</body>
</html>
