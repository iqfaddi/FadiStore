{% extends "base.html" %}
{% block content %}
<div class="grid2">
  <div class="card">
    <h3 style="margin-top:0">Alfa uShare</h3>
    <div class="muted">Choose a package and enter the number.</div>
    {% if error %}<div style="margin-top:10px;color:#fca5a5">{{ error }}</div>{% endif %}
    <form method="post" action="/buy-ushare">
      <label>Package</label>
      <select name="package_id" required>
        {% for p in packages %}
          <option value="{{ p.id }}">{{ p.name }} - {{ fmt(p.price) }} LBP</option>
        {% endfor %}
      </select>
      <label>Ushare Number</label>
      <input name="user_number" placeholder="03xxxxxx" required />
      <div style="margin-top:12px">
        <button class="btn" type="submit">Buy</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Last Orders</h3>
    {% include "orders_table.html" %}
  </div>
</div>
{% endblock %}
