<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <style>
    body{font-family:Arial;background:#0f172a;color:#fff;margin:0;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .card{width:380px;background:#020617;border:1px solid #1f2937;border-radius:14px;padding:18px}
    input{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:#fff}
    button{width:100%;padding:10px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-weight:800;cursor:pointer}
    .muted{color:#cbd5e1;font-size:13px}
    .err{background:#3f1d1d;border:1px solid #7f1d1d;color:#fecaca;padding:10px;border-radius:12px;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 6px 0">Admin Panel</h2>
    <div class="muted" style="margin-bottom:14px">Login to fulfill stock orders (manual credentials).</div>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login">
      <div class="muted" style="margin:0 0 6px 0">Password</div>
      <input type="password" name="password" required />
      <div style="height:10px"></div>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
