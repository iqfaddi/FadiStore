<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fadi Store | Maintenance</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      radial-gradient(circle at top left,#3b2a00 0%,transparent 35%),
      radial-gradient(circle at bottom right,#5a3d00 0%,transparent 35%),
      linear-gradient(135deg,#050505,#111111,#000000);
      font-family:Arial,sans-serif;
      color:white;
      position:relative;
    }

    /* Animated Glow */
    .glow{
      position:absolute;
      width:500px;
      height:500px;
      background:#facc15;
      opacity:0.12;
      border-radius:50%;
      filter:blur(140px);
      animation:move 7s infinite alternate ease-in-out;
    }

    @keyframes move{
      from{
        transform:translate(-150px,-100px);
      }

      to{
        transform:translate(150px,100px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      width:90%;
      max-width:720px;
      padding:55px 40px;
      text-align:center;
      border-radius:30px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,215,0,0.15);
      box-shadow:0 0 50px rgba(255,215,0,0.12);
    }

    .logo{
      width:120px;
      height:120px;
      margin:auto;
      margin-bottom:25px;
      border-radius:30px;
      background:linear-gradient(135deg,#facc15,#b8860b);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:58px;
      font-weight:bold;
      color:#000;
      box-shadow:0 0 35px rgba(250,204,21,0.35);
    }

    h1{
      font-size:56px;
      color:#facc15;
      letter-spacing:4px;
      margin-bottom:12px;
    }

    .subtitle{
      color:#d1d5db;
      font-size:16px;
      letter-spacing:5px;
      margin-bottom:40px;
    }

    .arabic{
      font-size:34px;
      font-weight:bold;
      margin-bottom:18px;
    }

    .english{
      font-size:21px;
      color:#d1d5db;
      line-height:1.9;
      margin-bottom:35px;
    }

    .whatsapp{
      display:inline-block;
      padding:16px 34px;
      border-radius:60px;
      background:#25D366;
      color:white;
      text-decoration:none;
      font-size:18px;
      font-weight:bold;
      transition:0.3s;
      box-shadow:0 0 30px rgba(37,211,102,0.35);
    }

    .whatsapp:hover{
      transform:scale(1.06);
      background:#1ebe5d;
    }

    .footer{
      margin-top:40px;
      color:#9ca3af;
      font-size:14px;
      letter-spacing:1px;
    }

    @media(max-width:768px){

      h1{
        font-size:40px;
      }

      .arabic{
        font-size:25px;
      }

      .english{
        font-size:18px;
      }

      .logo{
        width:100px;
        height:100px;
        font-size:45px;
      }

    }

  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">

    <div class="logo">
      F
    </div>

    <h1>FADI STORE</h1>

    <div class="subtitle">
      APPLICATION SUBSCRIPTIONS
    </div>

    <div class="arabic">
      🚧 الموقع تحت الصيانة
    </div>

    <div class="english">
      We are currently improving the website
      to provide you with a better experience.
      <br><br>
      نعمل حالياً على تطوير الموقع
      وسنعود قريباً بحلة جديدة 🚀
    </div>

    <a
      class="whatsapp"
      href="https://wa.me/9613177862"
      target="_blank"
    >
      WhatsApp: +9613177862
    </a>

    <div class="footer">
      © Fadi Store — All Rights Reserved
    </div>

  </div>

</body>
</html>
