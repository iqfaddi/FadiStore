{% extends "base.html" %}
{% block content %}

    <h2 style="margin:0 0 6px 0">Choose a Section</h2>
    <div class="muted">Select a category below.</div>
  </div>
  <div style="height:12px"></div>
  <div class="grid3">
    <a class="card" href="/ushare">
      <h3 style="margin:0 0 6px 0">Alfa uShare</h3>
      <div class="muted">Packages + number</div>
      <div class="sep"></div>

      <h3 style="margin:0 0 6px 0">Netflix</h3>
      <div class="muted">Premium Subscription</div>
      <div class="sep"></div>
      <span class="pill">Open</span>
    </a>
    <a class="card" href="/shahid">
      <h3 style="margin:0 0 6px 0">Shahid VIP</h3>
      <div class="muted">Premium Subscription</div>
      <div class="sep"></div>

    </a>
